services:
  edgar4j:
    build:
      context: .
    image: edgar4j:latest
    ports:
      - "8080:8080"
    environment:
      EDGAR4J_RESOURCE_MODE: ${EDGAR4J_RESOURCE_MODE:-high}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-Edgar4J/1.0 (ops@example.com)}
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/edgar4j
      SPRING_DATASOURCE_USERNAME: edgar4j
      SPRING_DATASOURCE_PASSWORD: edgar4j
      SPRING_MONGODB_URI: mongodb://mongodb:27017/edgar
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - edgar4j-data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_started
        required: false
    profiles:
      - low
      - high

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - high

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: edgar4j
      POSTGRES_USER: edgar4j
      POSTGRES_PASSWORD: edgar4j
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgar4j"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - high

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    profiles:
      - high

volumes:
  edgar4j-data:
  mongo-data:
  pg-data:
  redis-data:
