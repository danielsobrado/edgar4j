server:
  port: 8080

spring:
  application:
    name: edgar4j
  profiles:
    group:
      low:
        - resource-low
      high:
        - resource-high
      test-low:
        - resource-low
  cloud:
    config:
      enabled: ${SPRING_CLOUD_CONFIG_ENABLED:false}
      fail-fast: false
  mongodb:
    uri: ${SPRING_MONGODB_URI:${MONGO_URL:mongodb://localhost:27017/edgar}}
    auto-index-creation: ${MONGODB_AUTO_INDEX_CREATION:true}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/edgar4j}
    username: ${SPRING_DATASOURCE_USERNAME:edgar4j}
    password: ${SPRING_DATASOURCE_PASSWORD:edgar4j}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:15}
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  batch:
    job:
      enabled: false
  data:
    jpa:
      repositories:
        enabled: false
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: PT5S
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
    elasticsearch:
      cluster-name: ${ELASTICSEARCH_CLUSTER_NAME:edgar4j-local}
      cluster-nodes: ${ELASTICSEARCH_CLUSTER_NODES:localhost:9200}
      repositories:
        enabled: false
  elasticsearch:
    repositories:
      enabled: ${ELASTICSEARCH_REPOSITORIES_ENABLED:false}
  task:
    execution:
      pool:
        core-size: 8
        max-size: 20
        queue-capacity: 100
        keep-alive: PT60S
    scheduling:
      pool:
        size: 5
edgar4j:
    resource-mode: ${EDGAR4J_RESOURCE_MODE:high}
    sec:
        user-agent: ${SEC_USER_AGENT:}
    urls:
        baseSecUrl: https://www.sec.gov
        baseDataSecUrl: https://data.sec.gov
        edgarDataArchivesUrl: https://www.sec.gov/Archives/edgar/data
        submissionsUrl: https://data.sec.gov/submissions
        submissionsCIKUrl: https://data.sec.gov/submissions/CIK
        bulkSubmissionsFileUrl: https://www.sec.gov/Archives/edgar/daily-index/bulkdata/submissions.zip
        bulkCompanyFactsFileUrl: https://www.sec.gov/Archives/edgar/daily-index/xbrl/companyfacts.zip
        companyTickersUrl: https://www.sec.gov/files/company_tickers.json
        companyTickersExchangesUrl: https://www.sec.gov/files/company_tickers_exchange.json
        companyTickersMFsUrl: https://www.sec.gov/files/company_tickers_mf.json
        eftsSearchUrl: https://efts.sec.gov/LATEST/search-index
    persistence:
        database: postgresql
    jobs:
        sp500-sync:
            enabled: ${SP500_SYNC_ENABLED:true}
            cron: ${SP500_SYNC_CRON:0 0 3 * * SUN}
        market-data-sync:
            enabled: ${MARKET_DATA_SYNC_ENABLED:true}
            cron: ${MARKET_DATA_SYNC_CRON:0 0 */2 * * MON-FRI}
            batch-size: ${MARKET_DATA_SYNC_BATCH_SIZE:50}
        realtime-filing-sync:
            enabled: ${REALTIME_FILING_SYNC_ENABLED:true}
            cron: ${REALTIME_FILING_SYNC_CRON:0 */15 * * * *}
            forms: ${REALTIME_FILING_SYNC_FORMS:4}
            lookback-hours: ${REALTIME_FILING_SYNC_LOOKBACK_HOURS:1}
            max-pages: ${REALTIME_FILING_SYNC_MAX_PAGES:10}
            page-size: ${REALTIME_FILING_SYNC_PAGE_SIZE:100}
    # Phase 3: Market Data Provider Configuration
    providers:
        alpha-vantage:
            api-key: ${ALPHA_VANTAGE_API_KEY:demo}
            base-url: https://www.alphavantage.co/query
            enabled: ${ALPHA_VANTAGE_ENABLED:false}
            priority: 2
            rate-limit:
                requests: 5
                period: PT1M
            timeout: PT30S
            retry-attempts: 3
            retry-delay: PT1S
        finnhub:
            api-key: ${FINNHUB_API_KEY:demo}
            base-url: https://finnhub.io/api/v1
            enabled: ${FINNHUB_ENABLED:false}
            priority: 3
            rate-limit:
                requests: 60
                period: PT1M
            timeout: PT30S
            retry-attempts: 3
            retry-delay: PT1S
        yahoo-finance:
            base-url: https://query1.finance.yahoo.com/v8/finance/chart
            enabled: ${YAHOO_FINANCE_ENABLED:true}
            priority: 1
            rate-limit:
                requests: 2000
                period: PT1H
            timeout: PT30S
            retry-attempts: 3
            retry-delay: PT1S
        cache:
            enabled: ${MARKET_DATA_CACHE_ENABLED:true}
            stock-price-ttl: PT15M
            company-profile-ttl: PT24H
            financial-metrics-ttl: PT6H
            historical-prices-ttl: PT1H
            max-cache-size: 10000
    export:
        max-records: ${EDGAR4J_EXPORT_MAX_RECORDS:10000}

# Management and Monitoring
management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,prometheus
    endpoint:
        health:
            probes:
                enabled: true
            show-details: when-authorized
    health:
        livenessstate:
            enabled: true
        readinessstate:
            enabled: true
    metrics:
        export:
            prometheus:
                enabled: true

# Logging
logging:
    level:
        org.jds.edgar4j: INFO
        org.springframework.cache: WARN
        org.springframework.web.client: WARN
    pattern:
        console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
