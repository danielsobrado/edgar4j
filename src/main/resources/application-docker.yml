# Docker profile configuration
# This profile is used when running in Docker containers
#
# REQUIRED Environment Variables:
#   MONGODB_URI - MongoDB connection string (no default for security)
#
# Optional Environment Variables:
#   MONGODB_DATABASE - Database name (default: edgar)
#   SEC_USER_AGENT - User agent for SEC API calls

server:
  port: 8080

spring:
  cloud:
    config:
      enabled: false
  mongodb:
    uri: ${SPRING_MONGODB_URI:${MONGO_URL:mongodb://mongo:27017/edgar}}
    database: ${SPRING_MONGODB_DATABASE:${MONGODB_DATABASE:edgar}}
    auto-index-creation: ${SPRING_DATA_MONGODB_AUTO_INDEX_CREATION:false}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/edgar4j}
    username: ${SPRING_DATASOURCE_USERNAME:edgar4j}
    password: ${SPRING_DATASOURCE_PASSWORD:edgar4j}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  elasticsearch:
    repositories:
      enabled: ${ELASTICSEARCH_REPOSITORIES_ENABLED:false}

edgar4j:
  sec:
    user-agent: ${SEC_USER_AGENT:}
  security:
    enabled: ${EDGAR4J_SECURITY_ENABLED:false}
    username: ${EDGAR4J_SECURITY_USERNAME:}
    password: ${EDGAR4J_SECURITY_PASSWORD:}
  jobs:
    sp500-sync:
      enabled: true
    market-data-sync:
      enabled: true
    realtime-filing-sync:
      enabled: true
    ticker-sync:
      enabled: true
    filing-sync:
      enabled: true
    data-integrity:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    org.jds.edgar4j: INFO
    org.springframework.data.mongodb: WARN
    org.springframework.web: WARN
